name: validate-and-analyze

# Manual trigger: run AFTER the first backfill has committed
# data/raw/gdelt_volume.csv. Produces docs/data/validation.json (hit-rate,
# placebo, robustness, drift), the precision samples, and the analysis
# outputs (seasonality, alt specs, priced-risk gap, cross-source).
# GDELT-dependent steps are continue-on-error so one rate-limit storm
# doesn't discard the rest; results merge into validation.json per step.

on:
  workflow_dispatch:
  # Self-chaining: fires after every daily-update; the gate job below
  # lets the heavy battery run only when validation has never produced
  # its key figure (first successful backfill), so this runs exactly
  # once autonomously and stays manual thereafter.
  workflow_run:
    workflows: ["daily-update"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: igrm-pipeline
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=yes" >> "$GITHUB_OUTPUT"
          elif [ -f docs/data/validation.json ] && grep -q '"hit_rate"' docs/data/validation.json; then
            echo "run=no" >> "$GITHUB_OUTPUT"
          else
            echo "run=yes" >> "$GITHUB_OUTPUT"
          fi

  validate:
    needs: gate
    if: needs.gate.outputs.run == 'yes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Guard - need backfilled data
        run: test -f data/raw/gdelt_volume.csv
      - name: Hit rate (offline, the key figure)
        run: python -m src.validate hit-rate
      - name: Placebo channels (GDELT)
        continue-on-error: true
        run: python -m src.validate placebo
      - name: Dictionary robustness (GDELT)
        continue-on-error: true
        run: python -m src.validate robustness
      - name: Coverage drift (GDELT)
        continue-on-error: true
        run: python -m src.validate drift
      - name: Precision samples (GDELT artlist; author marks Y/N)
        continue-on-error: true
        run: python -m src.validate precision
      - name: Wikipedia cross-source
        continue-on-error: true
        run: python -m src.fetch_wikipedia
      - name: Seasonality (offline)
        run: python -m src.seasonality
      - name: Alternative specifications (offline)
        run: python -m src.alt_specs
      - name: Priced-risk gap (Yahoo Finance)
        continue-on-error: true
        run: python -m src.priced_risk
      - name: Commit results
        if: always()
        run: |
          git config user.name "igrm-bot"
          git config user.email "actions@github.com"
          git add data/raw docs validation || true
          git commit -m "validation + analysis: $(date -u +%F)" || echo "no changes"
          git pull --rebase origin main || true
          git push
