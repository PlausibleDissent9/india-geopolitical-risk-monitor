name: daily-update

on:
  schedule:
    - cron: "30 12 * * *"   # 12:30 UTC = 18:00 IST, after NSE close
  workflow_dispatch:
    inputs:
      backfill:
        description: "Run full backfill from 2017-01-01 (first run: yes)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Enforce dictionary rules (ex-ante rule)
        run: python -m pytest -q
      - name: Run pipeline
        # Backfill mode supervises itself: GDELT's rate limiter kills
        # naive runs mid-fetch, so retry with cooldowns inside one job,
        # committing the chunk cache between passes -- progress survives
        # even a job-level timeout, and each pass resumes from cache.
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            git config user.name "igrm-bot"
            git config user.email "actions@github.com"
            ok=0
            for i in $(seq 1 12); do
              echo "::group::backfill pass $i"
              if python -m src.run_daily --backfill; then
                ok=1; echo "::endgroup::"; break
              fi
              echo "::endgroup::"
              git add data/raw || true
              git commit -m "backfill chunk cache: pass $i" || true
              git push || true
              echo "pass $i died; cooling down 240s"
              sleep 240
            done
            [ "$ok" = "1" ]
          else
            python -m src.run_daily
          fi
      - name: Weekly datapack (Fridays)
        if: github.event.schedule != ''
        run: |
          if [ "$(date -u +%u)" = "5" ]; then python -m src.make_datapack; fi
      - name: Commit data
        # always(): a pipeline crash mid-backfill must still commit the
        # chunk cache, so the next run resumes instead of refetching --
        # GDELT's rate limiter makes uncached retries expensive. The
        # fail-loud gate keeps docs/data untouched on crashes, so a
        # partial run can never publish partial site data.
        if: always()
        run: |
          git config user.name "igrm-bot"
          git config user.email "actions@github.com"
          # .gitignore excludes Yahoo-derived prices.csv / derived_returns.csv;
          # only the GDELT store persists (backfill is expensive to redo).
          # docs/ also carries rendered pages (methodology.html, feed.xml,
          # notes.json) produced by the publish step.
          git add data/raw docs notes-inbox || true
          git commit -m "data: update $(date -u +%F)" || echo "no changes"
          git push
